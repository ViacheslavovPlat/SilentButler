<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-4">
      <div class="card p-4">
        <h3 class="text-center mb-4">📝 Register</h3>
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" [(ngModel)]="request.username" name="username" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" [(ngModel)]="request.email" name="email" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" [(ngModel)]="request.password" name="password" required>
          </div>
          <div *ngIf="error" class="alert alert-danger py-2">{{ error }}</div>
          <button type="submit" class="btn btn-success w-100" [disabled]="loading">
            {{ loading ? 'Loading...' : 'Register' }}
          </button>
        </form>
        <p class="text-center mt-3 mb-0">
          Already have account? <a routerLink="/login">Login</a>
        </p>
      </div>
    </div>
  </div>
</div>
