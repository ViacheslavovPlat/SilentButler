<app-navbar></app-navbar>
<div class="container">
  <h3 class="mt-4 mb-3">My Rooms</h3>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border"></div>
  </div>

  <div *ngIf="noHouse && !loading" class="card p-4 mb-4 text-center">
    <h5 class="mb-3">You do not have a house yet.</h5>
    <p class="text-muted mb-3">Create your first house to start adding rooms.</p>
    <div class="mx-auto" style="max-width: 400px;">
      <div class="input-group mb-2">
        <input type="text" class="form-control" placeholder="House name" [(ngModel)]="newHouseName">
      </div>
      <div class="input-group mb-3">
        <input type="text" class="form-control" placeholder="Address" [(ngModel)]="newHouseAddress">
      </div>
      <button class="btn btn-primary w-100" (click)="createHouse()" [disabled]="!newHouseName.trim() || !newHouseAddress.trim() || creatingHouse">
        {{ creatingHouse ? 'Creating...' : 'Create House' }}
      </button>
    </div>
  </div>

  <ng-container *ngIf="!noHouse && !loading">
    <div class="card p-3 mb-4">
      <div class="input-group">
        <input type="text" class="form-control" placeholder="New room name" [(ngModel)]="newRoomName">
        <button class="btn btn-primary" (click)="createRoom()" [disabled]="!newRoomName.trim()">Add Room</button>
      </div>
    </div>

    <div class="row">
      <div class="col-md-4" *ngFor="let room of rooms">
        <div class="card p-3 mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <h5 class="mb-0">{{ room.name }}</h5>
            <div>
              <a [routerLink]="['/devices', room.id]" class="btn btn-sm btn-outline-primary me-1">Devices</a>
              <button class="btn btn-sm btn-outline-danger" (click)="deleteRoom(room.id)">Delete</button>
            </div>
          </div>
        </div>
      </div>
      <div *ngIf="rooms.length === 0" class="text-center text-muted mt-4">
        No rooms yet. Create one above!
      </div>
    </div>
  </ng-container>
</div>
