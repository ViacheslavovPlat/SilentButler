<app-navbar></app-navbar>
<div class="container">
  <div class="d-flex align-items-center mt-4 mb-3">
    <a routerLink="/rooms" class="btn btn-outline-secondary btn-sm me-3">← Back</a>
    <h3 class="mb-0">🔌 Devices {{ room ? '— ' + room.name : '' }}</h3>
  </div>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="card p-3 mb-4">
    <div class="row g-2">
      <div class="col-md-4">
        <input type="text" class="form-control" placeholder="Device name" [(ngModel)]="newDevice.name">
      </div>
      <div class="col-md-3">
        <select class="form-select" [(ngModel)]="newDevice.categoryId">
          <option *ngFor="let c of categories" [value]="c.id">{{ c.name }}</option>
        </select>
      </div>
      <div class="col-md-2">
        <div class="form-check mt-2">
          <input class="form-check-input" type="checkbox" [(ngModel)]="newDevice.status" id="statusCheck">
          <label class="form-check-label" for="statusCheck">On</label>
        </div>
      </div>
      <div class="col-md-3">
        <button class="btn btn-primary w-100" (click)="createDevice()" [disabled]="!newDevice.name.trim()">
          Add Device
        </button>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="text-center">
    <div class="spinner-border"></div>
  </div>

  <div class="row" *ngIf="!loading">
    <div class="col-md-4" *ngFor="let device of devices">
      <div class="card p-3 mb-3" [class.device-on]="device.status" [class.device-off]="!device.status">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <h5 class="mb-1">{{ getCategoryIcon(device.categoryName) }} {{ device.name }}</h5>
            <span class="badge bg-secondary">{{ device.categoryName }}</span>
            <span class="badge ms-1" [class.bg-success]="device.status" [class.bg-danger]="!device.status">
              {{ device.status ? 'ON' : 'OFF' }}
            </span>
          </div>
          <div>
            <button class="btn btn-sm me-1" [class.btn-success]="!device.status" [class.btn-warning]="device.status"
                    (click)="toggleDevice(device.id)">
              {{ device.status ? 'Turn Off' : 'Turn On' }}
            </button>
            <button class="btn btn-sm btn-outline-danger" (click)="deleteDevice(device.id)">🗑</button>
          </div>
        </div>
      </div>
    </div>
    <div *ngIf="devices.length === 0" class="text-center text-muted mt-4">
      No devices in this room yet.
    </div>
  </div>
</div>
