services:
  db:
    image: postgres:16-alpine
    container_name: silent-butler-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: silentbutler
      POSTGRES_USER: silentbutler
      POSTGRES_PASSWORD: ${DB_PASSWORD:-silentbutler}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U silentbutler -d silentbutler"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: silent-butler-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/silentbutler
      SPRING_DATASOURCE_USERNAME: silentbutler
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-silentbutler}
      JWT_SECRET: ${JWT_SECRET:-my_super_secret_token_platon_123_413_555_000}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-86400000}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: silent-butler-frontend
    restart: unless-stopped
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  pgdata:
